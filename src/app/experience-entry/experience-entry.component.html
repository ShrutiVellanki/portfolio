<div *ngFor="let experience of experiences">
    <mat-expansion-panel 
        class="entry"
    >
        <mat-expansion-panel-header>
            <mat-panel-title>
                <b>{{ experience.jobTitle }}</b>
                <p>{{ experience.company }}</p>
                <p class="date mat-expansion-panel-header-description">{{ experience.date }}</p>
            </mat-panel-title>
            <mat-panel-description>
                <p>
                    {{ experience.date }}
                </p>
            </mat-panel-description>
        </mat-expansion-panel-header>

        <p>I'm visible because I am open</p>
    </mat-expansion-panel>
</div>
